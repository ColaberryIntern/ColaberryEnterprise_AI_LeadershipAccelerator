server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Proxy ShipCES frontend preview (full stack — assets + API)
    location /preview/shipces/ {
        proxy_pass http://host.docker.internal:8889/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter 'src="/assets/' 'src="/preview/shipces/assets/';
        sub_filter 'href="/assets/' 'href="/preview/shipces/assets/';
        sub_filter '"/api/' '"/preview/shipces/api/';
        sub_filter "'/api/" "'/preview/shipces/api/";
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;
        proxy_hide_header X-Frame-Options;
    }

    # Proxy LandJet frontend preview (Next.js — assets + API)
    location /preview/landjet/ {
        proxy_pass http://host.docker.internal:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter 'src="/_next/' 'src="/preview/landjet/_next/';
        sub_filter 'href="/_next/' 'href="/preview/landjet/_next/';
        sub_filter '"/api/' '"/preview/landjet/api/';
        sub_filter "'/api/" "'/preview/landjet/api/";
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;
        proxy_hide_header X-Frame-Options;
    }

    # Proxy API requests to DEV backend
    location /api/ {
        proxy_pass http://accelerator-dev2-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # Proxy health check to DEV backend
    location /health {
        proxy_pass http://accelerator-dev2-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # OpenClaw tracked short URL redirects
    location /i/ {
        proxy_pass http://accelerator-dev2-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — NO cache in dev
    location /static/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Prevent caching of index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
