version: "3.8"

# Second dev instance — port 9998
# Run: docker compose -p colaberry-dev2 -f docker-compose.dev2.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: accelerator-dev2-backend
    restart: always
    env_file: .env.dev
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@accelerator-db:5432/accelerator_dev2
      INTELLIGENCE_ENGINE_URL: http://accelerator-dev2-intelligence:5000
      NODE_OPTIONS: "--max-old-space-size=512"
      APP_ENV: dev
      ENABLE_EXPERIMENTAL_FEATURES: "true"
      ENABLE_CONTEXT_GRAPH_V2: "true"
      ENABLE_EXECUTION_ENGINE: "true"
    networks:
      - default
      - prod_network
    expose:
      - "3001"
    ports:
      - "3013:3001"

  intelligence:
    build:
      context: ./intelligence/ai_engine
      dockerfile: Dockerfile
    container_name: accelerator-dev2-intelligence
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@accelerator-db:5432/accelerator_dev2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      FLASK_ENV: development
    networks:
      - default
      - prod_network
    expose:
      - "5000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.dev2
    container_name: accelerator-dev2-nginx
    restart: always
    ports:
      - "9998:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

networks:
  prod_network:
    external: true
    name: colaberry-accelerator_default
