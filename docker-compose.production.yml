version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: accelerator-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-accelerator}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-accelerator}
      POSTGRES_DB: ${DB_NAME:-accelerator_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-accelerator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: accelerator-backend
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@postgres:5432/${DB_NAME:-accelerator_prod}
      INTELLIGENCE_ENGINE_URL: http://intelligence:5000
      NODE_OPTIONS: "--max-old-space-size=512"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - screenshots:/data/screenshots
      - browser_profiles:/data/browser-profiles
    expose:
      - "3001"

  intelligence:
    build:
      context: ./intelligence/ai_engine
      dockerfile: Dockerfile
    container_name: accelerator-intelligence
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@postgres:5432/${DB_NAME:-accelerator_prod}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      FLASK_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - dictionary_data:/app/intelligence
    expose:
      - "5000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: accelerator-nginx
    restart: always
    ports:
      - "8888:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  dictionary_data:
  screenshots:
  browser_profiles:
