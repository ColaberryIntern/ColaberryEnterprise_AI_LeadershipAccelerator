<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Colaberry · Community — Feed + Post Composer (Design)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     COLABERRY DESIGN SYSTEM — semantic tokens (from colaberry-design-system)
     cherry #FB2832 (constant accent) · leaf #77BB4A · berry #367895
     Roboto / Roboto Mono · Quicksand (logotype only) · Lucide icons
     ============================================================ */
  :root{
    --red-500:#FB2832; --red-600:#E5121D; --red-700:#C20E1E;
    --green-500:#77BB4A; --green-600:#5BA63C; --green-700:#468A2E; --green-800:#3C7A26;
    --blue-500:#367895; --blue-600:#2E6A86; --amber-500:#E8920C; --amber-700:#B5710A;
    --n0:#FFFFFF; --n50:#F8F8F7; --n100:#F1F1F0; --n200:#E4E4E3; --n300:#D8D8D8;
    --n400:#B4B4B4; --n500:#8C8C8C; --n600:#6B6B6B; --n700:#4A4A4A; --n800:#2B2B2B; --n900:#1A1A1A;
    /* semantic */
    --surface-page:#F8F8F7; --surface-card:#FFFFFF; --surface-sunken:#F1F1F0;
    --text-strong:#1A1A1A; --text-body:#2B2B2B; --text-muted:#6B6B6B; --text-on-accent:#FFFFFF;
    --border-subtle:#E4E4E3; --border-default:#D8D8D8; --border-strong:#B4B4B4;
    --brand-accent:#FB2832; --brand-accent-text:#E5121D; --link:#2E6A86;
    --leaf-text:#468A2E; --amber-text:#B5710A;
    --status-info:#367895; --status-success:#5BA63C; --status-warn:#E8920C;
    --focus-ring:0 0 0 3px rgba(54,120,149,.45);
    --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:20px; --radius-pill:999px;
    --shadow-sm:0 1px 2px rgba(26,26,26,.05);
    --shadow-md:0 3px 8px rgba(26,26,26,.06),0 1px 3px rgba(26,26,26,.04);
    --shadow-lg:0 12px 30px rgba(26,26,26,.10),0 3px 8px rgba(26,26,26,.06);
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px; --space-8:32px;
    --font-sans:'Roboto',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-mono:'Roboto Mono',ui-monospace,Menlo,Consolas,monospace;
    --font-logo:'Quicksand',system-ui,sans-serif;
    --ease-out:cubic-bezier(.22,1,.36,1); --dur-fast:.14s; --dur-mid:.22s;
  }
  [data-theme="dark"]{
    --surface-page:#0F0F0F; --surface-card:#1A1A1A; --surface-sunken:#161616;
    --text-strong:#FFFFFF; --text-body:#E4E4E3; --text-muted:#B4B4B4; --text-on-accent:#FFFFFF;
    --border-subtle:rgba(255,255,255,.10); --border-default:rgba(255,255,255,.16); --border-strong:rgba(255,255,255,.28);
    --link:#6FB2CC; --leaf-text:#9BD173; --brand-accent-text:#FF6A71; --amber-text:#F0B450;
    --shadow-md:0 3px 8px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
    --shadow-lg:0 12px 30px rgba(0,0,0,.5),0 3px 8px rgba(0,0,0,.4);
    --n0:#1A1A1A; --n100:#1F1F1F; --n200:#262626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--font-sans);background:var(--surface-page);color:var(--text-body);line-height:1.55;font-size:15.5px;
    -webkit-font-smoothing:antialiased;overflow-wrap:break-word;transition:background var(--dur-mid) var(--ease-out),color var(--dur-mid) var(--ease-out)}
  h1,h2,h3,h4{font-family:var(--font-sans);font-weight:700;color:var(--text-strong);margin:0;text-wrap:balance;letter-spacing:-.01em}
  p{text-wrap:pretty;margin:0}
  a{color:var(--link);text-decoration:none} a:hover{text-decoration:underline}
  button{font-family:inherit}
  img,svg{max-width:100%}
  .mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  :focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:var(--radius-sm)}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  ::selection{background:#ffd5d7}

  /* ---------- primitives ---------- */
  .btn{display:inline-flex;align-items:center;gap:8px;border:none;cursor:pointer;font-size:14.5px;font-weight:700;
    padding:10px 18px;border-radius:var(--radius-pill);transition:background var(--dur-fast) var(--ease-out),border-color var(--dur-fast);font-family:inherit;color:var(--text-body)}
  .btn svg{width:17px;height:17px}
  .btn.primary{background:var(--brand-accent);color:#fff} .btn.primary:hover{background:var(--red-700)}
  .btn.berry{background:var(--blue-500);color:#fff} .btn.berry:hover{background:var(--blue-600)}
  .btn.leaf{background:var(--green-600);color:#fff} .btn.leaf:hover{background:var(--green-800)}
  .btn.ghost{background:var(--surface-sunken);color:var(--text-body);border:1px solid var(--border-default)}
  .btn.ghost:hover{border-color:var(--blue-500);color:var(--blue-500)}
  .btn.sm{padding:8px 14px;font-size:13.5px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .iconbtn{width:40px;height:40px;border-radius:var(--radius-pill);border:1px solid var(--border-default);background:var(--surface-card);
    cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:.16s var(--ease-out);position:relative}
  .iconbtn:hover{border-color:var(--blue-500);color:var(--blue-500)} .iconbtn svg{width:19px;height:19px}
  .iconbtn .dotn{position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;border-radius:var(--radius-pill);background:var(--brand-accent);
    color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--surface-card)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--radius-pill);letter-spacing:.02em}
  .badge .sw{width:7px;height:7px;border-radius:50%}
  .badge.lvl{background:rgba(91,166,60,.16);color:var(--leaf-text)}
  .badge.coach{background:rgba(54,120,149,.14);color:var(--blue-500)}
  .badge.you{background:rgba(251,40,50,.12);color:var(--brand-accent-text)}
  .card{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-xl);box-shadow:var(--shadow-md)}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex:none;font-size:14px}
  input.f,textarea.f,select.f{width:100%;border:1px solid var(--border-default);border-radius:var(--radius-md);padding:11px 13px;font-family:inherit;
    font-size:14.5px;background:var(--surface-card);color:var(--text-body);outline:none;transition:border-color var(--dur-fast)}
  input.f:focus,textarea.f:focus,select.f:focus{border-color:var(--blue-500);box-shadow:var(--focus-ring)}
  textarea.f{resize:vertical;min-height:60px}
  .muted{color:var(--text-muted)} .small{font-size:13px}

  /* ---------- app shell (community-only frame) ---------- */
  .app{display:grid;grid-template-columns:248px 1fr;grid-template-rows:auto 1fr;min-height:100vh;grid-template-areas:"top top" "nav main"}
  .topbar{grid-area:top;position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:12px 20px;
    background:var(--surface-card);border-bottom:1px solid var(--border-default)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mark{width:38px;height:38px;flex:none}
  .brand b{font-family:var(--font-logo);font-size:18px;font-weight:700;color:var(--text-strong);line-height:1;display:block}
  .brand b .grad{background:linear-gradient(90deg,var(--green-600),var(--blue-500));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand span{font-size:11.5px;color:var(--text-muted)}
  .topsearch{flex:1;max-width:420px;display:flex;align-items:center;gap:9px;background:var(--surface-sunken);border:1px solid var(--border-default);
    border-radius:var(--radius-pill);padding:9px 16px;color:var(--text-muted)}
  .topsearch input{border:none;background:none;outline:none;font-size:14.5px;color:var(--text-body);width:100%;font-family:inherit}
  .topsearch svg{width:17px;height:17px;flex:none}
  .top-right{display:flex;align-items:center;gap:12px;margin-left:auto}
  .xphud{display:flex;flex-direction:column;gap:3px;min-width:140px}
  .xphud .row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12.5px}
  .xphud .lvl{font-weight:700;color:var(--leaf-text);display:flex;align-items:center;gap:5px}
  .xphud .lvl svg{width:14px;height:14px}
  .xphud .pts{font-family:var(--font-mono);font-weight:700;color:var(--text-muted);font-size:11.5px}
  .xpbar{height:6px;border-radius:var(--radius-pill);background:var(--surface-sunken);overflow:hidden;border:1px solid var(--border-subtle)}
  .xpbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green-600),var(--blue-500));transition:width .6s var(--ease-out)}
  @media(max-width:900px){.xphud,.topsearch{display:none}}

  .nav{grid-area:nav;background:var(--surface-card);border-right:1px solid var(--border-default);padding:16px 12px;
    position:sticky;top:63px;height:calc(100vh - 63px);overflow:auto;display:flex;flex-direction:column;gap:2px}
  .nav .grp{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin:14px 12px 6px;font-weight:700}
  .navbtn{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:var(--radius-pill);border:none;background:none;color:var(--text-body);
    font-size:14.5px;font-weight:500;cursor:pointer;text-align:left;width:100%;transition:background var(--dur-fast)}
  .navbtn svg{width:19px;height:19px;flex:none;opacity:.85}
  .navbtn .ct{margin-left:auto;font-size:12px;color:var(--text-muted);font-family:var(--font-mono)}
  .navbtn:hover{background:var(--surface-sunken);color:var(--text-strong)}
  .navbtn.active{background:#ffe7e8;color:var(--red-700);font-weight:700}
  [data-theme="dark"] .navbtn.active{background:rgba(251,40,50,.16);color:#FF6A71}
  .navbtn.active svg{opacity:1}
  .nav .src .ct{color:var(--green-700)}
  .navfoot{margin-top:auto;padding:12px;border-top:1px solid var(--border-subtle)}
  .online-h{font-size:12px;color:var(--text-muted);font-weight:600;display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green-600);box-shadow:0 0 0 3px rgba(91,166,60,.22)}
  .onrow{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:5px 6px;border-radius:var(--radius-md);cursor:pointer;width:100%;border:none;background:none;color:var(--text-body);text-align:left}
  .onrow:hover{background:var(--surface-sunken)}

  .main{grid-area:main;padding:22px 26px 80px;max-width:1180px;width:100%;margin:0 auto}
  @media(max-width:760px){.app{grid-template-columns:1fr;grid-template-areas:"top" "main"}.nav{display:none}.main{padding:16px 14px 60px}}

  .crumbs{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-muted);margin-bottom:14px;flex-wrap:wrap}
  .crumbs button{border:none;background:none;color:var(--link);font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;padding:0}
  .crumbs .sep{opacity:.5}
  .crumbs .cur{color:var(--text-body);font-weight:700}

  /* ---------- two-column layout: feed + sticky sidebar ---------- */
  .comm{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:24px;align-items:start}
  .comm-side{display:flex;flex-direction:column;gap:16px;position:sticky;top:80px}
  @media(max-width:1040px){.comm{grid-template-columns:1fr}.comm-side{position:static}}

  /* ---------- composer ---------- */
  .composer{padding:14px 16px}
  .cc-collapsed{display:flex;align-items:center;gap:12px;cursor:text}
  .cc-fake{flex:1;background:var(--surface-sunken);border:1px solid var(--border-default);border-radius:var(--radius-pill);padding:11px 18px;color:var(--text-muted);font-size:14.5px}
  .cc-collapsed:hover .cc-fake{border-color:var(--blue-500)}
  .cc-head{display:flex;align-items:center;gap:11px;margin-bottom:12px}
  .cc-name{font-weight:700;color:var(--text-strong);font-size:14.5px}
  .cc-modes{display:inline-flex;background:var(--surface-sunken);border:1px solid var(--border-default);border-radius:var(--radius-pill);padding:3px;margin-left:auto}
  .cc-modes button{border:none;background:none;padding:6px 13px;border-radius:var(--radius-pill);font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .cc-modes button svg{width:14px;height:14px}
  .cc-modes button.active{background:var(--surface-card);color:var(--text-strong);box-shadow:var(--shadow-sm)}
  .cc-title{width:100%;border:none;border-bottom:1px solid var(--border-subtle);background:none;font-size:17px;font-weight:700;color:var(--text-strong);outline:none;padding:2px 0 9px;margin-bottom:10px;font-family:inherit}
  .cc-title::placeholder{color:var(--text-muted)}
  .cc-body{position:relative}
  .cc-body textarea{width:100%;min-height:84px;border:1px solid var(--border-default);border-radius:var(--radius-md);background:var(--surface-card);color:var(--text-body);font-family:inherit;font-size:14.5px;padding:11px 13px;resize:vertical;outline:none}
  .cc-body textarea:focus{border-color:var(--blue-500);box-shadow:var(--focus-ring)}
  /* @mention autocomplete */
  .mention-pop{position:absolute;left:8px;bottom:10px;z-index:20;background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);width:240px;overflow:hidden;display:none}
  .mention-pop.show{display:block}
  .mention-pop button{display:flex;align-items:center;gap:9px;width:100%;border:none;background:none;padding:8px 11px;cursor:pointer;font-family:inherit;color:var(--text-body);text-align:left;font-size:13.5px}
  .mention-pop button:hover,.mention-pop button.hi{background:var(--surface-sunken)}
  /* poll builder */
  .poll-build{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .poll-opt{display:flex;align-items:center;gap:8px}
  .poll-opt input{flex:1}
  .poll-opt .rm{border:none;background:none;cursor:pointer;color:var(--text-muted);width:30px;height:30px;border-radius:var(--radius-md)}
  .poll-opt .rm:hover{background:var(--surface-sunken);color:var(--brand-accent-text)}
  .poll-add{align-self:flex-start;border:1px dashed var(--border-default);background:none;color:var(--blue-500);font-weight:700;font-size:13px;border-radius:var(--radius-md);padding:8px 13px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
  .poll-add:hover{border-color:var(--blue-500)}
  .attachpreview{display:none;align-items:center;gap:11px;margin-top:11px;padding:10px 12px;border:1px dashed var(--border-default);border-radius:var(--radius-md);background:var(--surface-sunken);font-size:13px}
  .attachpreview.show{display:flex}
  .attachpreview .th{width:46px;height:46px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--blue-500),var(--green-600));display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
  .attachpreview .x{margin-left:auto;border:none;background:none;color:var(--text-muted);cursor:pointer;font-weight:700;font-family:inherit}
  .cc-tools{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:12px}
  .cc-tool{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-default);background:var(--surface-card);color:var(--text-body);border-radius:var(--radius-pill);padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.14s var(--ease-out)}
  .cc-tool:hover{border-color:var(--blue-500);color:var(--blue-500)} .cc-tool svg{width:16px;height:16px}
  .cc-foot{display:flex;align-items:center;gap:12px;margin-top:13px;flex-wrap:wrap}
  .cc-foot .cat{display:flex;align-items:center;gap:8px} .cc-foot .cat select{padding:8px 12px;border-radius:var(--radius-pill)}
  .cc-foot .actions{display:flex;gap:9px;margin-left:auto}

  /* ---------- toolbar: pills + sort + search ---------- */
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
  .pill{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;padding:7px 14px;border-radius:var(--radius-pill);
    border:1px solid var(--border-default);background:var(--surface-card);color:var(--text-body);cursor:pointer;font-family:inherit;transition:.14s var(--ease-out)}
  .pill svg{width:14px;height:14px} .pill .ct{font-family:var(--font-mono);font-size:11.5px;color:var(--text-muted)}
  .pill:hover{border-color:var(--blue-500);color:var(--blue-500)}
  .pill.active{background:var(--brand-accent);border-color:var(--brand-accent);color:#fff}
  .pill.active .ct{color:rgba(255,255,255,.85)} .pill.active svg{color:#fff}
  .pill.src{border-style:dashed} .pill.src.active{border-style:solid}
  .feedbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--surface-sunken);border:1px solid var(--border-default);border-radius:var(--radius-pill);padding:3px}
  .seg button{border:none;background:none;padding:7px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--surface-card);color:var(--text-strong);box-shadow:var(--shadow-sm)}
  .feedbar .count{margin-left:auto;font-size:13px;color:var(--text-muted);font-weight:600}

  /* ---------- post card ---------- */
  .post{padding:0;margin-bottom:16px;overflow:hidden;position:relative}
  .post.pinned{border-top:3px solid var(--amber-500)}
  .pinflag{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--amber-text);padding:10px 18px 0}
  .pinflag svg{width:13px;height:13px}
  .post-head{display:flex;align-items:center;gap:11px;padding:16px 18px 0}
  .post-head .who{font-weight:700;font-size:14.5px;color:var(--text-strong);display:flex;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer}
  .post-head .who:hover{color:var(--blue-500)}
  .post-head .when{font-size:12.5px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .srctag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--radius-pill);text-transform:uppercase;letter-spacing:.02em}
  .srctag svg{width:11px;height:11px}
  .srctag.buildlog{background:rgba(91,166,60,.16);color:var(--leaf-text)}
  .srctag.showcase{background:rgba(232,146,12,.16);color:var(--amber-text)}
  .post-more{margin-left:auto;align-self:flex-start;border:none;background:none;color:var(--text-muted);cursor:pointer;width:34px;height:34px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center}
  .post-more:hover{background:var(--surface-sunken);color:var(--text-body)}
  .post-body{padding:12px 18px 0;cursor:pointer}
  .post-body .ttl{font-size:17px;font-weight:700;color:var(--text-strong);margin-bottom:6px;line-height:1.3}
  .post-body p{font-size:14.5px;color:var(--text-body);line-height:1.55}
  .media{margin:13px 18px 0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);height:200px;display:flex;align-items:center;justify-content:center;color:#fff;position:relative}
  .media .cap{position:absolute;left:14px;bottom:12px;font-size:13px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.35)}
  .media .play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center}
  .media .play svg{width:22px;height:22px;color:var(--red-700);margin-left:3px}
  /* poll render */
  .poll{margin:13px 18px 0;display:flex;flex-direction:column;gap:8px}
  .poll-row{position:relative;border:1px solid var(--border-default);border-radius:var(--radius-md);padding:11px 14px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-body);overflow:hidden;background:var(--surface-card);transition:border-color var(--dur-fast)}
  .poll-row:hover{border-color:var(--blue-500)}
  .poll-row .fill{position:absolute;inset:0 auto 0 0;background:rgba(54,120,149,.12);width:0;transition:width .5s var(--ease-out);z-index:0}
  .poll-row.win .fill{background:rgba(91,166,60,.18)}
  .poll-row .lbl,.poll-row .pct{position:relative;z-index:1}
  .poll-row .pct{float:right;font-family:var(--font-mono);font-weight:700;color:var(--text-muted)}

  /* ---------- sidebar cards ---------- */

  .cc-stat .n{font-size:21px;font-weight:700;color:var(--text-strong);font-family:var(--font-mono)} .cc-stat .l{font-size:10.5px;color:var(--text-muted);margin-top:2px}

  .topcat .cn{flex:1;font-size:13.5px;font-weight:600} .topcat .cc{font-family:var(--font-mono);font-size:12px;color:var(--text-muted)}

  /* ---------- member profile + category header ---------- */

  /* ---------- drawer (Build spec for Kes) ---------- */

  .drawer .db{flex:1;overflow:auto;padding:24px 26px 60px}
  .ks-sec{margin-bottom:26px}
  .ks-sec h3{font-size:15px;color:var(--text-strong);display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle)}
  .ks-sec h3 .num{width:24px;height:24px;border-radius:50%;background:var(--brand-accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono)}

  .ks-card{background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:14px 16px;margin:8px 0}
  .ks-card b{color:var(--text-strong)}
  .ks-list{margin:6px 0;padding-left:20px} .ks-list li{margin:5px 0;font-size:13.5px}

  .meth.get{background:rgba(54,120,149,.14);color:var(--blue-500)} .meth.post{background:rgba(91,166,60,.16);color:var(--leaf-text)}
  .meth.del{background:rgba(251,40,50,.12);color:var(--brand-accent-text)} .meth.patch{background:rgba(232,146,12,.16);color:var(--amber-text)}
  .chkrow{display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:13.5px}

/* ============================================================ ROUTER */
function route(view,params){
  params=params||{}; state.view=view; state.id=params.id||null; savedOnly=false;
  closeOverlays();
  renderNav();
  const c=document.getElementById('crumbs'); const r=document.getElementById('route');
  if(view==='feed'){ c.style.display='none'; r.innerHTML=feedView(); afterFeed(); }
  else if(view==='category'){ crumb([['Community',"route('feed')"],[cat(state.id).label]]); r.innerHTML=categoryView(state.id); afterFeed(); }
  else if(view==='post'){ const p=post(state.id); crumb([['Community',"route('feed')"],[cat(p.cat).label,"route('category',{id:'"+p.cat+"'})"],[p.title.slice(0,40)+'…']]); r.innerHTML=postView(state.id); }
  else if(view==='member'){ crumb([['Community',"route('feed')"],[M[state.id].nm]]); r.innerHTML=memberView(state.id); afterFeed(); }
  window.scrollTo(0,0);
}
function crumb(parts){
  const c=document.getElementById('crumbs'); c.style.display='flex';
  c.innerHTML=parts.map((p,i)=>{ const last=i===parts.length-1; const node= (p[1]&&!last)?'<button onclick="'+p[1]+'">'+esc(p[0])+'</button>':'<span class="'+(last?'cur':'')+'">'+esc(p[0])+'</span>';
    return (i>0?'<span class="sep">/</span>':'')+node; }).join('');
}

function visiblePosts(){
  let list=POSTS.slice();
  const f=state.view==='category'?state.id:state.cat;
  if(savedOnly) list=list.filter(p=>p.saved);
  else if(f && f!=='all') list=list.filter(p=>p.cat===f);
  if(state.q){ const q=state.q.toLowerCase(); list=list.filter(p=>(p.title+' '+p.body+' '+M[p.by].nm).toLowerCase().includes(q)); }
  const pin=(a,b)=>(b.pinned?1:0)-(a.pinned?1:0);
  if(state.sort==='top') list.sort((a,b)=>pin(a,b)||(b.likes-a.likes)||(a.mins-b.mins));
  else if(state.sort==='unanswered') list.sort((a,b)=>pin(a,b)||(cmtCount(a.id)-cmtCount(b.id))||(a.mins-b.mins));
  else list.sort((a,b)=>pin(a,b)||(a.mins-b.mins));
  return list;
}

  const fc=document.getElementById('feedCount'); if(fc) fc.textContent=posts.length+' post'+(posts.length===1?'':'s');
}

  document.querySelectorAll('#route .pill').forEach(p=>p.classList.remove('active')); afterFeed();
  document.getElementById('crumbs').style.display='flex'; crumb([['Community',"route('feed')"],['Saved']]); }
function onSearch(v){ state.q=v.trim();
  if(state.view==='post'||state.view==='member'){ route('feed'); }
  afterFeed(); }

/* ---- composer behavior ---- */
function openComposer(){ document.getElementById('ccCollapsed').hidden=true; const o=document.getElementById('ccOpen'); o.hidden=false; document.getElementById('ccText').focus(); }
function cancelComposer(){ ['ccTitle','ccText'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';}); clearAttach(); pollOpts=['','']; const pb=document.getElementById('pollBuild'); if(pb){pb.innerHTML='';pb.style.display='none';} composerMode='post'; const mp=document.getElementById('mode-post'),ml=document.getElementById('mode-poll'); if(mp)mp.classList.add('active'); if(ml)ml.classList.remove('active'); document.getElementById('ccOpen').hidden=true; document.getElementById('ccCollapsed').hidden=false; hideMention(); }
function setMode(m){ composerMode=m; document.getElementById('mode-post').classList.toggle('active',m==='post'); document.getElementById('mode-poll').classList.toggle('active',m==='poll');
  document.getElementById('pollBuild').style.display=m==='poll'?'flex':'none';
  if(m==='poll'&&!document.querySelector('#pollBuild .poll-opt')){ pollOpts=['','']; renderPollBuild(); }
  if(document.getElementById('ccOpen').hidden) openComposer();
}
let pollOpts=['',''];
function renderPollBuild(){
  const w=document.getElementById('pollBuild');
  w.innerHTML=pollOpts.map((o,i)=>'<div class="poll-opt"><input class="f" placeholder="Option '+(i+1)+'" value="'+esc(o)+'" oninput="pollOpts['+i+']=this.value">'
    +(pollOpts.length>2?'<button class="rm" onclick="rmPollOpt('+i+')" aria-label="Remove option">'+ic('x')+'</button>':'')+'</div>').join('')
    +(pollOpts.length<5?'<button class="poll-add" onclick="addPollOpt()">'+ic('plus')+'Add option</button>':'');
}
function addPollOpt(){ pollOpts.push(''); renderPollBuild(); }
function rmPollOpt(i){ pollOpts.splice(i,1); renderPollBuild(); }
function attachMedia(){ document.getElementById('attach').classList.add('show'); }
function clearAttach(){ const a=document.getElementById('attach'); if(a) a.classList.remove('show'); }
function insertMention(){ const t=document.getElementById('ccText'); t.value=(t.value+' @').replace(/^\s+/,''); t.focus(); onComposeInput(); }
function onComposeInput(){
  const t=document.getElementById('ccText'); const v=t.value; const m=v.slice(0,t.selectionStart).match(/@(\w*)$/);
  if(m){ showMention(m[1]); } else hideMention();
}
function showMention(q){
  const pop=document.getElementById('mentionPop'); const ql=q.toLowerCase();
  const hits=Object.keys(M).filter(k=>!M[k].you && M[k].nm.toLowerCase().includes(ql)).slice(0,5);
  if(!hits.length){ hideMention(); return; }
  pop.innerHTML=hits.map(k=>'<button onmousedown="event.preventDefault();pickMention(\''+k+'\')">'+avatar(k,24)+esc(M[k].nm)+'</button>').join('');
  pop.classList.add('show');
}
function hideMention(){ const p=document.getElementById('mentionPop'); if(p) p.classList.remove('show'); }
function pickMention(k){ const t=document.getElementById('ccText'); t.value=t.value.replace(/@(\w*)$/,'@'+M[k].nm.replace(/\s/g,'')+' '); t.focus(); hideMention(); }
function submitPost(){
  const txt=document.getElementById('ccText').value.trim();
  const title=document.getElementById('ccTitle').value.trim();
  if(!txt && composerMode!=='poll'){ toast('Add something to your post','Write a message before posting','info'); return; }
  const catId=document.getElementById('ccCat').value;
  const id='p-new-'+POSTS.length;
  const np={id,cat:catId,by:'maya',time:'just now',mins:-1,title:title||(txt.split('\n')[0].slice(0,68)||'Quick poll'),body:txt,likes:0,liked:false,saved:false};
  if(composerMode==='poll'){ const opts=pollOpts.map(o=>o.trim()).filter(Boolean); if(opts.length<2){ toast('A poll needs 2 options','Add at least two choices','info'); return; }
    np.poll={voted:false,options:opts.map(t=>({t,v:0}))}; }
  if(document.getElementById('attach').classList.contains('show')) np.media={label:'build-screenshot.png',grad:'linear-gradient(135deg,#367895,#5BA63C)'};
  POSTS.unshift(np); COMMENTS[id]=[];
  cancelComposer();
  if(state.view==='category'){ route('category',{id:catId}); }
  else { savedOnly=false; state.cat='all'; renderNav(); document.getElementById('route').innerHTML=feedView(); afterFeed(); }
  award(10,'Posted in '+cat(catId).label);
}

/* ============================================================ POST CARD */
function postCard(p,full){
  const onclick = full ? '' : ' onclick="route(\'post\',{id:\''+p.id+'\'})"';
  return '<div class="card post'+(p.pinned?' pinned':'')+'" id="card-'+p.id+'">'
   +(p.pinned?'<div class="pinflag">'+ic('pin')+'Pinned</div>':'')
   +'<div class="post-head">'+avatar(p.by,42)
   +'<div style="min-width:0"><div class="who" onclick="event.stopPropagation();route(\'member\',{id:\''+p.by+'\'})">'+esc(M[p.by].nm)+' '+lvlBadge(p.by)+'</div>'
   +'<div class="when">'+esc(p.time)+' · '+esc(cat(p.cat).label)+srcTag(p)+'</div></div>'
   +'<button class="post-more" aria-label="Post options" onclick="event.stopPropagation();openPostMenu(event,\''+p.id+'\')">'+ic('more')+'</button></div>'
   +'<div class="post-body"'+onclick+'><div class="ttl">'+esc(p.title)+'</div><p>'+esc(p.body)+'</p></div>'
   + mediaHtml(p) + pollHtml(p)
   + postFoot(p)
   +'<div class="comments'+(full?' open':'')+'" id="cm-'+p.id+'">'+(full?commentsHtml(p.id):'')+'</div>'
   +'</div>';
}
function mediaHtml(p){ if(!p.media) return ''; const m=p.media;
  return '<div class="media" style="background:'+m.grad+'" '+(p.media.video?'role="button" tabindex="0"':'')+'>'
   +(m.video?'<span class="play">'+ic('play')+'</span>':'')+'<span class="cap">'+esc(m.label)+'</span></div>'; }
function pollHtml(p){ if(!p.poll) return ''; const pl=p.poll; const total=pl.options.reduce((s,o)=>s+o.v,0)||1; const max=Math.max(...pl.options.map(o=>o.v));
  return '<div class="poll">'+pl.options.map((o,i)=>{ const pct=Math.round(o.v/total*100);
    return '<div class="poll-row'+(pl.voted?' voted':'')+(pl.voted&&o.v===max?' win':'')+'" '+(pl.voted?'':'onclick="event.stopPropagation();votePoll(\''+p.id+'\','+i+')"')+'>'
      +'<span class="fill" style="width:'+(pl.voted?pct:0)+'%"></span><span class="lbl">'+esc(o.t)+'</span>'+(pl.voted?'<span class="pct">'+pct+'%</span>':'')+'</div>'; }).join('')
   +'<div class="meta">'+(pl.voted?total+' votes · thanks for voting':total+' votes · tap an option to vote')+'</div></div>'; }
function postFoot(p){
  return '<div class="post-foot">'
   +'<button class="actbtn like'+(p.liked?' on':'')+'" onclick="event.stopPropagation();likePost(\''+p.id+'\',this)"><svg viewBox="0 0 24 24" fill="'+(p.liked?'currentColor':'none')+'">'+ICONS.heart+'</svg> <span id="lk-'+p.id+'">'+p.likes+'</span></button>'
   +'<button class="actbtn" onclick="event.stopPropagation();toggleComments(\''+p.id+'\')">'+ic('comment')+' <span class="cmt-count" id="cc-'+p.id+'">'+cmtCount(p.id)+'</span></button>'
   +'<button class="actbtn" onclick="event.stopPropagation();toggleComments(\''+p.id+'\',true)">'+ic('reply')+' Reply</button>'
   +'<button class="actbtn save'+(p.saved?' on':'')+'" onclick="event.stopPropagation();savePost(\''+p.id+'\',this)"><svg viewBox="0 0 24 24" fill="'+(p.saved?'currentColor':'none')+'">'+ICONS.bookmark+'</svg> <span id="sv-'+p.id+'">'+(p.saved?'Saved':'Save')+'</span></button>'
   + commenterStack(p.id)
   +'</div>';
}
function commenterStack(id){ const cs=commentsFor(id).slice(0,3); if(!cs.length) return '';
  return '<span class="commenters"><span class="stk">'+cs.map(c=>'<span class="avatar a" style="background:'+M[c.by].bg+'">'+M[c.by].in+'</span>').join('')+'</span><span class="t">'+cmtCount(id)+' joined</span></span>'; }

/* ---- post interactions ---- */
function likePost(id,btn){ const p=post(id); p.liked=!p.liked; p.likes+=p.liked?1:-1;
  document.querySelectorAll('#lk-'+id).forEach(e=>e.textContent=p.likes);
  document.querySelectorAll('#card-'+id+' .actbtn.like, #post-'+id+' .actbtn.like').forEach(b=>{ b.classList.toggle('on',p.liked); b.querySelector('svg').setAttribute('fill',p.liked?'currentColor':'none'); b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop'); });
  if(p.liked) award(1,'Liked '+M[p.by].nm+"'s post"); }
function savePost(id,btn){ const p=post(id); p.saved=!p.saved;
  document.querySelectorAll('#sv-'+id).forEach(e=>e.textContent=p.saved?'Saved':'Save');
  document.querySelectorAll('.actbtn.save').forEach(b=>{ if(b.querySelector('#sv-'+id)){ b.classList.toggle('on',p.saved); b.querySelector('svg').setAttribute('fill',p.saved?'currentColor':'none'); } });
  renderNav(); toast(p.saved?'Saved to your bookmarks':'Removed from bookmarks'); }
function votePoll(id,i){ const p=post(id); if(p.poll.voted) return; p.poll.options[i].v++; p.poll.voted=true;
  const card=document.getElementById('card-'+id)||document.getElementById('post-'+id);
  if(card){ const holder=card.querySelector('.poll'); if(holder) holder.outerHTML=pollHtml(p); }
  award(2,'Voted in a poll'); }

function openPostMenu(e,id){

function followUser(k){ closeOverlays(); toast('Following '+M[k].nm,'You will see their posts first'); award(2,'Followed a teammate'); }
function pinPost(id){ const p=post(id); p.pinned=!p.pinned; closeOverlays(); refreshCurrent(); toast(p.pinned?'Pinned to top':'Unpinned'); }
function reportPost(id){ closeOverlays(); toast('Reported to coaches','Thanks — a coach will review it','info'); }
function deletePost(id){ const i=POSTS.findIndex(p=>p.id===id); if(i>=0) POSTS.splice(i,1); closeOverlays(); if(state.view==='post') route('feed'); else refreshCurrent(); toast('Post deleted'); }
function refreshCurrent(){ if(state.view==='feed') route('feed'); else if(state.view==='category') route('category',{id:state.id}); else if(state.view==='member') route('member',{id:state.id}); }

/* ============================================================ COMMENTS (1-level replies + likes) */
function toggleComments(id,focus){
  const sec=document.getElementById('cm-'+id); if(!sec) return;
  const open= focus ? (sec.classList.add('open'),true) : sec.classList.toggle('open');
  if(open){ sec.innerHTML=commentsHtml(id); if(focus){ const ci=document.getElementById('ci-'+id); if(ci) ci.focus(); } }
}
function commentsHtml(id){
  const list=commentsFor(id);
  const rows=list.length? list.map((c,i)=>cmtRow(id,c,i)).join('')
    : '<p class="small muted" style="padding:4px 0 8px">No comments yet. Start the conversation.</p>';
  return rows
   +'<div class="cmt-form">'+avatar('maya',32)+'<textarea class="f" id="ci-'+id+'" placeholder="Write a comment" aria-label="Write a comment"></textarea><button class="btn berry sm" onclick="postComment(\''+id+'\')">'+ic('send')+'Post</button></div>';
}
function cmtRow(id,c,i){
  const replies=(c.replies||[]).map(r=>'<div class="cmt"><span class="avatar" style="width:30px;height:30px;font-size:11px;background:'+M[r.by].bg+'">'+M[r.by].in+'</span>'
    +'<div class="cbub"><div class="bub"><div class="nm" onclick="route(\'member\',{id:\''+r.by+'\'})">'+esc(M[r.by].nm)+'<span class="tm">'+esc(r.t)+'</span></div><div class="tx">'+esc(r.x)+'</div></div></div></div>').join('');
  return '<div class="cmt"><span class="avatar" style="width:34px;height:34px;font-size:12px;background:'+M[c.by].bg+'">'+M[c.by].in+'</span>'
   +'<div class="cbub"><div class="bub"><div class="nm" onclick="route(\'member\',{id:\''+c.by+'\'})">'+esc(M[c.by].nm)+'<span class="tm">'+esc(c.t)+'</span></div><div class="tx">'+esc(c.x)+'</div></div>'
   +'<div class="cact"><button class="'+(c.liked?'on':'')+'" onclick="likeComment(\''+id+'\','+i+')"><svg viewBox="0 0 24 24" fill="'+(c.liked?'currentColor':'none')+'">'+ICONS.heart+'</svg> <span>'+(c.likes||0)+'</span></button>'
   +'<button onclick="showReply(\''+id+'\','+i+')">'+ic('reply')+'Reply</button></div>'
   +(replies?'<div class="replies">'+replies+'</div>':'')
   +'<div class="replyform" id="rf-'+id+'-'+i+'">'+avatar('maya',30)+'<textarea class="f" id="ri-'+id+'-'+i+'" placeholder="Reply to '+esc(M[c.by].nm.split(' ')[0])+'" aria-label="Write a reply"></textarea><button class="btn berry sm" onclick="postReply(\''+id+'\','+i+')">Reply</button></div>'
   +'</div></div>';
}
function refreshThread(id){ const sec=document.getElementById('cm-'+id); if(sec&&sec.classList.contains('open')) sec.innerHTML=commentsHtml(id);
  document.querySelectorAll('#cc-'+id).forEach(e=>e.textContent=cmtCount(id)); }
function postComment(id){ const ta=document.getElementById('ci-'+id); const txt=ta.value.trim(); if(!txt) return;
  commentsFor(id).push({by:'maya',t:'just now',x:txt,likes:0,liked:false,replies:[]}); refreshThread(id); award(3,'Added a comment'); }
function showReply(id,i){ const f=document.getElementById('rf-'+id+'-'+i); f.classList.toggle('show'); if(f.classList.contains('show')){ const ri=document.getElementById('ri-'+id+'-'+i); if(ri) ri.focus(); } }
function postReply(id,i){ const ta=document.getElementById('ri-'+id+'-'+i); const txt=ta.value.trim(); if(!txt) return;
  const c=commentsFor(id)[i]; (c.replies=c.replies||[]).push({by:'maya',t:'just now',x:txt}); refreshThread(id); award(3,'Replied to a comment'); }
function likeComment(id,i){ const c=commentsFor(id)[i]; c.liked=!c.liked; c.likes=(c.likes||0)+(c.liked?1:-1); refreshThread(id); if(c.liked) award(1,'Liked a comment'); }

  +'<p class="small muted" style="margin-top:8px">Presence is poll-based at launch (BC#9985688722). Gamification at launch is points + personal level only; leaderboards are P1 (BC#9985704174) — the sidebar board here is illustrative.</p></div>'

  +'<div class="ks-sec"><h3><span class="num">2</span> Data model (Sequelize entities)</h3>'
  +'<table class="ks"><tr><th>Entity</th><th>Key fields</th><th>Notes</th></tr>'
  +'<tr><td><code>Post</code></td><td>id, enrollment_id (author), category_id, kind(text|poll), title, body, media_url, pinned, source(buildlog|artifact|null), source_ref, like_count, comment_count, created_at</td><td>Per-student isolation via cohort scope. <code>source</code> set when auto-created from a BuildLog/Artifact.</td></tr>'
