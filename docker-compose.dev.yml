name: accelerator-dev

# Project 'accelerator-dev' is set via the top-level `name:` above — it matches the running
# accelerator-dev-* containers. Do NOT rely on a -p flag: without a baked name this file would
# default to the directory name (colaberry-accelerator = PROD's project) and a plain
# `docker compose -f docker-compose.dev.yml up` could recreate/remove prod containers.
# This prevents Docker from conflicting with production containers.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: accelerator-dev-backend
    restart: always
    env_file: .env.dev
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@accelerator-db:5432/accelerator_dev1
      INTELLIGENCE_ENGINE_URL: http://accelerator-dev-intelligence:5000
      NODE_OPTIONS: "--max-old-space-size=512"
      APP_ENV: dev
      ENABLE_EXPERIMENTAL_FEATURES: "true"
      ENABLE_CONTEXT_GRAPH_V2: "true"
      ENABLE_EXECUTION_ENGINE: "true"
      # Preview stack provisioning (isolated port pool per env)
      PREVIEW_STACKS_ROOT: /var/preview-stacks
      PREVIEW_PORT_POOL_START: "11000"
      PREVIEW_PORT_POOL_END: "11999"
      PREVIEW_IDLE_TIMEOUT_MS: "1800000"
      PREVIEW_CPU_LIMIT: "0.5"
      PREVIEW_MEM_LIMIT: "512m"
      PREVIEW_PROXY_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - prod_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/preview-stacks-dev:/var/preview-stacks
    expose:
      - "3002"
    ports:
      - "3012:3001"

  intelligence:
    build:
      context: ./intelligence/ai_engine
      dockerfile: Dockerfile
    container_name: accelerator-dev-intelligence
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-accelerator}:${DB_PASSWORD:-accelerator}@accelerator-db:5432/accelerator_dev1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      FLASK_ENV: development
    networks:
      - default
      - prod_network
    expose:
      - "5000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.dev
    container_name: accelerator-dev-nginx
    restart: always
    ports:
      - "9999:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

networks:
  prod_network:
    external: true
    name: colaberry-accelerator_default
